name: "Publish"

on:
  release:
    types: [published]
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  publish:
    name: Publish builder
    permissions:
      packages: write
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: False
      matrix:
        abi: ["cp314"]
        tag: ["musllinux_1_2"]
        arch: ["aarch64", "amd64"]
        include:
          - abi: cp314
            base: 3.14-alpine3.22

          - arch: aarch64
            platform: linux/arm64
            runs-on: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1

      - shell: bash
        id: info
        run: |
          name="ghcr.io/home-assistant/wheels/${{ matrix.arch }}/${{ matrix.tag }}/${{ matrix.abi }}"

          version=$(echo "${{ github.ref }}" | awk -F"/" '{print $NF}' )
          if [ "${version}" = "master" ]; then
            version=dev
          fi

          echo "name=$name" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: . # So action will not pull the repository again
          push: ${{ github.event_name != 'pull_request' }}
          pull: true
          platforms: ${{ matrix.platform }}
          cache-from: type=registry,ref=${{ steps.info.outputs.name }}:dev
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-python:${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
            CPYTHON_ABI=${{ matrix.abi }}
          tags: |
            ${{ steps.info.outputs.name }}:${{ steps.info.outputs.version }}
            ${{ steps.info.outputs.name }}:${{ github.sha }}
